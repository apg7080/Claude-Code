<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaMed — Ambient Voice Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="../../novamed-core/tokens.css">
  <link rel="stylesheet" href="../../novamed-core/base.css">
  <link rel="stylesheet" href="../../novamed-core/components.css">
  <style>
    .hidden { display: none; }

    /* Voice recording bar — sits inside the editor header, like active-dictation's voice-header */
    .voice-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0 12px;
    }
    .voice-header-left {
      display: flex; align-items: center; gap: 10px;
    }
    .voice-status {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      transition: color 500ms ease-out;
    }
    .voice-status.active { color: var(--voice-recording); }

    /* Transcript area — uses same .se-text pattern as single-editor sections */
    .transcript-area {
      background: var(--panel-bg);
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 12px;
      font-size: 14px; line-height: 1.7;
      color: var(--text-secondary);
      min-height: 72px;
      font-style: italic;
      letter-spacing: 0.005em;
      overflow: hidden;
      transition: border-color 400ms cubic-bezier(.39, .575, .565, 1);
    }
    .transcript-area.recording { border-color: var(--border-focus); }

    /* Processing overlay inside the editor */
    .processing-overlay {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 48px 24px;
    }

    /* Suggestion tooltip */
    .suggestion-tooltip {
      position: absolute; z-index: 10001;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; box-shadow: var(--ai-tooltip-shadow);
      padding: 10px 12px; min-width: 180px;
      opacity: 0; transform: translateY(4px);
      transition: opacity 400ms ease-out, transform 400ms ease-out;
    }
    .suggestion-tooltip.show { opacity: 1; transform: translateY(0); }
    .suggestion-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.4; }
    .suggestion-label strong { color: var(--text-base); font-weight: 600; }
    .suggestion-actions { display: flex; gap: 6px; }
    .suggestion-btn {
      padding: 4px 12px; border-radius: var(--r-section);
      font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: all 300ms ease-out;
    }
    .suggestion-btn.accept { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
    .suggestion-btn.accept:hover { background: #2D6BC4; }
    .suggestion-btn.dismiss { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .suggestion-btn.dismiss:hover { border-color: var(--border-hover); color: var(--text-soft); }

    /* Chip highlight for suggestion */
    .chip-highlight { outline: 2px solid var(--chip-empty-border); outline-offset: 2px; border-radius: 4px; transition: outline-color 400ms ease-out; }
    .chip-highlight.confirmed { outline-color: var(--accent); }

    .flash-yellow { animation: badge-flash 500ms ease-out; }
    @keyframes badge-flash { 0% { background: #fef08a; } 100% { background: transparent; } }
  </style>
</head>
<body>

<div class="proto">

  <!-- ====== PRODUCT UI ====== -->
  <div class="proto-ui">

    <!-- Single editor card — same as active-dictation/ai-content -->
    <div class="editor" id="editor">
      <div class="ed-header" id="editorBody">
        <h2 class="ed-title">Findings</h2>

        <!-- Voice recording header — same pattern as active-dictation -->
        <div class="voice-header" id="voiceHeader">
          <div class="voice-header-left">
            <button class="voice-mic-btn active" id="micBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <div class="voice-waveform" id="waveform">
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
            </div>
            <span class="voice-status" id="voiceStatus">Ambient recording</span>
            <span class="voice-rec-time" id="recTime" style="font-size:12px;color:var(--text-secondary);font-variant-numeric:tabular-nums;">03:42</span>
          </div>
        </div>

        <!-- Transcript — displayed in a field-like area during recording -->
        <div class="transcript-area" id="transcriptArea">
          <span class="ph" id="transcriptPlaceholder">Listening for voice input...</span>
          <span id="transcript"></span>
        </div>

        <!-- Processing state (hidden, shows inside editor) -->
        <div class="processing-overlay hidden" id="processingState">
          <div class="processing-spinner"></div>
          <span class="processing-label">Compiling report from voice transcript...</span>
        </div>

        <!-- Finding 1 -->
        <div class="finding hidden" id="finding1">
          <div class="f-head">
            <span class="f-tag">01</span>
            <span class="f-title" id="findingTitle1">Polyp — Ascending Colon</span>
          </div>
          <div class="f-body" id="findingBody1">
            <div class="f-text" id="findingText1"></div>
          </div>
          <div class="rev-ban" id="reviewBanner1">
            <div class="rev-ban-l">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
              Physician verified
            </div>
            <button class="rev-ban-btn">Edit</button>
          </div>
        </div>

        <!-- Finding 2 -->
        <div class="finding hidden" id="finding2">
          <div class="f-head">
            <span class="f-tag">02</span>
            <span class="f-title" id="findingTitle2">Polyps — Sigmoid Colon</span>
          </div>
          <div class="f-body" id="findingBody2">
            <div class="f-text" id="findingText2"></div>
          </div>
          <div class="rev-ban" id="reviewBanner2">
            <div class="rev-ban-l">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
              Physician verified
            </div>
            <button class="rev-ban-btn">Edit</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Action indicator -->
    <div class="action-indicator" id="actionIndicator"></div>

    <!-- Play overlay -->
    <div class="play-overlay" id="playOverlay">
      <div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    </div>

  </div><!-- /proto-ui -->

  <!-- ====== NARRATION LAYER ====== -->
  <div class="proto-narration">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="caption"><span class="caption-text" id="sceneCaption"></span></div>

    <div class="stats" id="statsFootnote">
      <div class="stat"><div class="stat-v" id="statsTerms">12</div><div class="stat-l">terms recognized</div></div>
      <div class="stat"><div class="stat-v" id="statsCategories">8</div><div class="stat-l">categories</div></div>
      <div class="stat"><div class="stat-v" id="statsAccuracy">94%</div><div class="stat-l">avg. confidence</div></div>
      <div class="stat"><div class="stat-v" id="statsTime">38s</div><div class="stat-l">to document</div></div>
    </div>

    <div class="ctrls">
      <button class="ctrl-icon" id="replayBtn" title="Replay"><span class="material-symbols-outlined">replay</span></button>
      <button class="ctrl-icon" id="pauseBtn" title="Pause"><span class="material-symbols-outlined">pause</span></button>
    </div>
  </div><!-- /proto-narration -->

</div><!-- /proto -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script src="../../novamed-core/timeline.js"></script>
<script src="../../novamed-core/chips.js"></script>
<script src="../../novamed-core/ai-icon.js"></script>
<script src="../../novamed-core/fields.js"></script>
<script src="../../novamed-core/editor.js"></script>
<script src="../../novamed-core/voice.js"></script>
<script src="scenes.js"></script>
</body>
</html>
