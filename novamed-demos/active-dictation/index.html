<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaMed — Active Dictation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="../../novamed-core/tokens.css">
  <link rel="stylesheet" href="../../novamed-core/base.css">
  <link rel="stylesheet" href="../../novamed-core/components.css">
  <style>
    /* === Demo-specific styles === */

    /* Structured fields row */
    .fields-row {
      display: flex; gap: 16px; padding: 0 0 12px;
      flex-wrap: wrap;
    }
    .fields-row .nm-field { flex: 1; min-width: 140px; }

    /* Focus ring on fields */
    .nm-field.focused .nm-field-input {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59,125,216,0.15);
      transition: border-color 300ms ease-out, box-shadow 300ms ease-out;
    }

    /* Narrative editor area */
    .narrative-area {
      position: relative;
      margin-top: 4px;
    }
    .narrative-label {
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .narrative-editor {
      background: var(--panel-bg);
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      padding: 12px;
      font-size: 14px; font-weight: 400; line-height: 1.6;
      color: var(--text-body);
      min-height: 80px;
      word-wrap: break-word;
      transition: border-color 300ms ease-out;
      position: relative;
    }
    .narrative-editor.focused {
      border-color: var(--border-focus);
    }

    /* Mic + waveform header bar */
    .voice-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0 12px;
    }
    .voice-header-left {
      display: flex; align-items: center; gap: 10px;
    }
    .voice-status {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      transition: color 200ms ease-out;
    }
    .voice-status.active {
      color: var(--accent);
    }

    /* Waveform bar stagger delays */
    .voice-bar:nth-child(1) { animation-delay: 0s; }
    .voice-bar:nth-child(2) { animation-delay: 0.12s; }
    .voice-bar:nth-child(3) { animation-delay: 0.24s; }
    .voice-bar:nth-child(4) { animation-delay: 0.36s; }
    .voice-bar:nth-child(5) { animation-delay: 0.48s; }
    .voice-bar:nth-child(6) { animation-delay: 0.60s; }
    .voice-bar:nth-child(7) { animation-delay: 0.72s; }

    /* Dropdown for morphology */
    .morph-dropdown {
      position: absolute; top: 100%; left: 0; margin-top: 4px;
      width: 220px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r-section);
      box-shadow: 0 4px 16px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.04);
      z-index: 9999;
      opacity: 0; transform: translateY(-4px); pointer-events: none;
      transition: opacity 300ms ease-out, transform 300ms ease-out;
      max-height: 200px; overflow-y: auto; padding: 4px 0;
    }
    .morph-dropdown.open {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }
    .morph-dropdown .dd-item {
      height: var(--menu-item-h); padding: 0 12px;
      display: flex; align-items: center;
      font-size: 14px; color: var(--text-body);
      cursor: pointer; transition: background 200ms ease-out;
    }
    .morph-dropdown .dd-item:hover,
    .morph-dropdown .dd-item.hi { background: var(--chip-bg); }

    /* Morphology field wrapper needs relative for dropdown */
    .morph-field-wrap {
      position: relative;
      flex: 1; min-width: 140px;
    }

    /* Chip fill transition — smooth decel, no pop */
    .c.fill.voice-enter {
      transition: all 300ms var(--ease-decel, cubic-bezier(.4, 0, .1, 1));
    }

    /* Field focus smooth transition */
    .nm-field-input {
      transition: border-color 300ms ease-out, box-shadow 300ms ease-out;
    }
  </style>
</head>
<body>

<div class="proto">

  <!-- ====== PRODUCT UI ====== -->
  <div class="proto-ui">

    <div class="editor" id="editor">
      <div class="ed-header">
        <h2 class="ed-title">Findings</h2>

        <!-- Voice mic + waveform bar -->
        <div class="voice-header" id="voiceHeader">
          <div class="voice-header-left">
            <button class="voice-mic-btn" id="micBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <div class="voice-waveform" id="waveform">
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
              <div class="voice-bar"></div>
            </div>
            <span class="voice-status" id="voiceStatus">Voice input off</span>
          </div>
        </div>

        <!-- Finding 1 -->
        <div class="finding" id="finding1">
          <div class="f-head">
            <span class="f-tag">01</span>
            <span class="f-title">Polyp</span>
          </div>
          <div class="f-body">

            <!-- Structured fields -->
            <div class="fields-row" id="fieldsRow">
              <div class="nm-field" id="locationField">
                <label class="nm-field-label">Location <span class="nm-req">*</span></label>
                <div class="nm-field-input">
                  <span class="nm-field-value" id="locationValue"><span class="c empty">Location <span class="c-arr">&#9662;</span><span class="c-sep"></span><span class="c-x">&times;</span></span></span>
                </div>
              </div>
              <div class="nm-field" id="sizeField">
                <label class="nm-field-label">Size <span class="nm-req">*</span></label>
                <div class="nm-field-input">
                  <span class="nm-field-value" id="sizeValue"><span class="c empty">Size (mm) <span class="c-arr">&#9662;</span><span class="c-sep"></span><span class="c-x">&times;</span></span></span>
                </div>
              </div>
              <div class="morph-field-wrap">
                <div class="nm-field" id="morphField">
                  <label class="nm-field-label">Morphology</label>
                  <div class="nm-field-input">
                    <span class="nm-field-value" id="morphValue"><span class="c empty">Morphology <span class="c-arr">&#9662;</span><span class="c-sep"></span><span class="c-x">&times;</span></span></span>
                  </div>
                </div>
                <!-- Dropdown for manual morphology selection -->
                <div class="morph-dropdown" id="morphDropdown">
                  <div class="dd-item" data-value="sessile">Sessile</div>
                  <div class="dd-item" data-value="pedunculated">Pedunculated</div>
                  <div class="dd-item hi" data-value="traditional serrated adenoma">Traditional serrated adenoma</div>
                  <div class="dd-item" data-value="tubular adenoma">Tubular adenoma</div>
                  <div class="dd-item" data-value="villous adenoma">Villous adenoma</div>
                </div>
              </div>
            </div>

            <!-- Narrative text area -->
            <div class="narrative-area">
              <div class="narrative-label">Narrative</div>
              <div class="narrative-editor" id="narrativeEditor">
                <span class="ph">Dictate or type findings...</span>
              </div>
            </div>

          </div>

          <!-- Review banner -->
          <div class="rev-ban" id="reviewBanner">
            <div class="rev-ban-l">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
              Physician verified
            </div>
            <button class="rev-ban-btn">Edit</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Action indicator -->
    <div class="action-indicator" id="actionIndicator"></div>

    <!-- Play overlay -->
    <div class="play-overlay" id="playOverlay">
      <div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    </div>

  </div><!-- /proto-ui -->

  <!-- ====== NARRATION LAYER ====== -->
  <div class="proto-narration">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="caption"><span class="caption-text" id="sceneCaption"></span></div>

    <!-- Stats -->
    <div class="stats" id="statsFootnote">
      <div class="stat"><div class="stat-v" id="statsTerms">6</div><div class="stat-l">terms captured</div></div>
      <div class="stat"><div class="stat-v" id="statsCategories">4</div><div class="stat-l">categories</div></div>
      <div class="stat"><div class="stat-v" id="statsAccuracy">96%</div><div class="stat-l">avg. confidence</div></div>
      <div class="stat"><div class="stat-v" id="statsTime">32s</div><div class="stat-l">to document</div></div>
    </div>

    <!-- Controls -->
    <div class="ctrls">
      <button class="ctrl-icon" id="replayBtn" title="Replay"><span class="material-symbols-outlined">replay</span></button>
      <button class="ctrl-icon" id="pauseBtn" title="Pause"><span class="material-symbols-outlined">pause</span></button>
    </div>
  </div><!-- /proto-narration -->

</div><!-- /proto -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script src="../../novamed-core/timeline.js"></script>
<script src="../../novamed-core/chips.js"></script>
<script src="../../novamed-core/ai-icon.js"></script>
<script src="../../novamed-core/fields.js"></script>
<script src="../../novamed-core/editor.js"></script>
<script src="../../novamed-core/voice.js"></script>
<script src="scenes.js"></script>
</body>
</html>
